name: Update Dashboard Data

on:
  schedule:
    # Run daily at 08:00 UTC (2 hours after insta-tm ETL at 06:00 UTC)
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  update-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install boto3 pyproj shapely

      - name: Generate projects_summary.json from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python scripts/generate_summary.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/projects_summary.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update dashboard data ($(date -u +%Y-%m-%d))"
          git push
